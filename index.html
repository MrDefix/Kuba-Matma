<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuba uczy się matmy!</title>
    <meta name="description" content="Zestaw ćwiczeń z matematyki dla dzieci - dodawanie, odejmowanie, mnożenie i dzielenie">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="components.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Kuba uczy się matmy!</h1>
        <p>Zestaw ćwiczeń z matematyki</p>
    </header>

    <main>
        <a href="dodawanie-100.html" class="tile">
            <span class="tile-icon">+−<br>×÷</span>
            <h2>Dodawanie i odejmowanie</h2>
            <p>Zakres do 100</p>
        </a>

        <a href="mnozenie-dzielenie.html" class="tile">
            <span class="tile-icon">×÷<br>+−</span>
            <h2>Mnożenie i dzielenie</h2>
            <p>Zakres do 100</p>
        </a>

        <a href="dodawanie-pod-kreska.html" class="tile">
            <span class="tile-icon">+</span>
            <h2>Dodawanie pod kreską</h2>
            <p>Zakres do 1000</p>
        </a>

        <a href="odejmowanie-pod-kreska.html" class="tile">
            <span class="tile-icon">−</span>
            <h2>Odejmowanie pod kreską</h2>
            <p>Zakres do 1000</p>
        </a>
    </main>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker zarejestrowany');
            }).catch((err) => {
                console.log('Rejestracja SW nie powiodła się:', err);
            });
        }
    </script>
</body>

</html>
