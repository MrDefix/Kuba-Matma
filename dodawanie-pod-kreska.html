<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dodawanie pod kreską do 1000</title>
  <link rel="stylesheet" href="components.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .exercise-container {
      max-width: 100%;
      margin: 0 auto;
      padding: 12px 8px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .table-wrapper {
      display: flex;
      justify-content: center;
    }

    .math-table {
      border-collapse: collapse;
      table-layout: fixed;
      margin: 12px 0;
      width: 100%;
      max-width: 260px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .math-table colgroup col {
      width: 40px;
    }

    .math-table colgroup col:first-child {
      width: 30px;
    }

    .math-table td {
      height: 46px;
      text-align: center;
      vertical-align: middle;
      font-size: 1.3rem;
      font-weight: 600;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.03);
    }

    .math-table td.no-border {
      border: none;
      background: none;
    }

    .carry-row td {
      height: 28px;
      border: none !important;
      vertical-align: bottom;
    }

    .carry-input {
      width: 40px;
      height: 40px;
      text-align: center;
      font-size: 1rem;
      font-weight: 600;
      border: 1px dashed var(--glass-border) !important;
      border-radius: 4px;
      color: var(--pink-neon);
      background-color: rgba(244, 114, 182, 0.1);
      outline: none;
      transition: all 0.2s ease;
      font-family: 'Inter', system-ui, sans-serif;
      margin-bottom: 10px;
    }

    .carry-input:focus {
      border-color: var(--pink-neon) !important;
      box-shadow: var(--shadow-pink);
    }

    .line-row td {
      border-bottom: 2px solid var(--blue-neon) !important;
    }

    .result-input {
      width: 40px;
      height: 40px;
      text-align: center;
      border: 2px solid var(--glass-border);
      border-radius: 4px;
      background: var(--glass-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: var(--text-main);
      font-family: 'Inter', system-ui, sans-serif;
      transition: all 0.2s ease;
      border: 2px solid var(--blue-neon);
      margin: 10px 0;
      font-size: 20px
    }

    .result-input:focus {
      background-color: rgba(56, 189, 248, 0.2);
      outline: none;
    }

    .operator {
      font-size: 1.4rem;
      font-weight: bold;
      color: var(--pink-neon);
    }

    #feedback {
      margin-top: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      min-height: 24px;
      padding: 8px 12px;
      border-radius: var(--radius-sm);
    }

    #feedback.success {
      color: #4ade80;
      background: rgba(74, 222, 128, 0.15);
    }

    #feedback.error {
      color: #f87171;
      background: rgba(248, 113, 113, 0.15);
    }

    .stats {
      margin-top: 10px;
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stats span {
      color: var(--text-main);
      font-weight: 600;
    }

    .stats .correct-count {
      color: #4ade80;
    }

    .stats .incorrect-count {
      color: #f87171;
    }
  </style>
</head>

<body class="with-header horizontal-layout">
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="btn-back">‹</a>
      <h1>Dodawanie pod kreską</h1>
    </div>
    <button class="hamburger" onclick="toggleHistory()">☰</button>
  </div>

  <div class="main">
    <div class="exercise-container">
      <div class="table-wrapper">
        <table class="math-table">
          <colgroup>
            <col>
            <col>
            <col>
            <col>
          </colgroup>
          <tr class="carry-row">
            <td class="no-border"><input type="tel" class="carry-input" id="c4" maxlength="1"></td>
            <td class="no-border"><input type="tel" class="carry-input" id="c3" maxlength="1"></td>
            <td class="no-border"><input type="tel" class="carry-input" id="c2" maxlength="1"></td>
            <td class="no-border"></td>
          </tr>
          <tr>
            <td class="no-border"></td>
            <td id="n1-h">0</td>
            <td id="n1-t">0</td>
            <td id="n1-u">0</td>
          </tr>
          <tr class="line-row">
            <td class="no-border operator">+</td>
            <td id="n2-h">0</td>
            <td id="n2-t">0</td>
            <td id="n2-u">0</td>
          </tr>
          <tr>
            <td><input type="tel" class="result-input" id="res-1" maxlength="1"></td>
            <td><input type="tel" class="result-input" id="res-2" maxlength="1"></td>
            <td><input type="tel" class="result-input" id="res-3" maxlength="1"></td>
            <td><input type="tel" class="result-input" id="res-4" maxlength="1"></td>
          </tr>
        </table>
      </div>

      <div id="feedback"></div>
      <button class="btn-check" onclick="checkAnswer()">Sprawdź</button>
      <div class="stats">
        Poprawne: <span class="correct-count" id="correct-count">0</span> | Błędne: <span class="incorrect-count"
          id="incorrect-count">0</span>
      </div>
    </div>
  </div>

  <div class="history" id="historyPanel">
    <div class="history-header">
      <h3>Historia zadań</h3>
      <button class="close-history" onclick="toggleHistory()">×</button>
    </div>
    <div id="historyLog"></div>
  </div>

  <script>
    let val1, val2, totalSum;
    let scoreCorrect = 0;
    let scoreIncorrect = 0;
    let taskNumber = 1;

    const inputOrder = ['res-4', 'res-3', 'res-2', 'res-1'];

    inputOrder.forEach((id, index) => {
      const el = document.getElementById(id);
      el.addEventListener('input', function () {
        if (this.value.length === 1 && index < inputOrder.length - 1) {
          document.getElementById(inputOrder[index + 1]).focus();
        }
      });
    });

    function toggleHistory() {
      document.getElementById('historyPanel').classList.toggle('active');
    }

    function generateTask() {
      val1 = Math.floor(Math.random() * 850) + 100;
      val2 = Math.floor(Math.random() * (999 - 100)) + 100;
      if (val1 + val2 > 1999) val2 = 1999 - val1;

      totalSum = val1 + val2;

      const s1 = val1.toString().padStart(3, '0');
      const s2 = val2.toString().padStart(3, '0');

      document.getElementById('n1-h').innerText = s1[0];
      document.getElementById('n1-t').innerText = s1[1];
      document.getElementById('n1-u').innerText = s1[2];

      document.getElementById('n2-h').innerText = s2[0];
      document.getElementById('n2-t').innerText = s2[1];
      document.getElementById('n2-u').innerText = s2[2];

      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('feedback').innerText = '';
      document.getElementById('feedback').className = '';
      document.getElementById('historyPanel').classList.remove('active');
      document.getElementById('res-4').focus();
    }

    function checkAnswer() {
      const r1 = document.getElementById('res-1').value;
      const r2 = document.getElementById('res-2').value;
      const r3 = document.getElementById('res-3').value;
      const r4 = document.getElementById('res-4').value;

      const userString = (r1 + r2 + r3 + r4).trim();
      const userVal = parseInt(userString, 10);

      const isCorrect = userVal === totalSum;
      const log = document.getElementById('historyLog');
      const entry = document.createElement('div');
      const feedback = document.getElementById('feedback');

      if (isCorrect) {
        feedback.innerHTML = "Dobrze!";
        feedback.className = "success";
        scoreCorrect++;
        entry.className = "entry correct";
        entry.innerText = `#${taskNumber}: ${val1}+${val2}=${userVal} ✓`;
        document.getElementById('correct-count').innerText = scoreCorrect;
        log.prepend(entry);
        taskNumber++;
        setTimeout(generateTask, 1500);
      } else {
        feedback.innerHTML = "Błąd! Spróbuj poprawić.";
        feedback.className = "error";
        scoreIncorrect++;
        entry.className = "entry incorrect";
        entry.innerText = `#${taskNumber}: ${val1}+${val2}=${userString || '?'} ✗`;
        document.getElementById('incorrect-count').innerText = scoreIncorrect;
        log.prepend(entry);
        document.getElementById('res-4').focus();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    window.onload = generateTask;
  </script>
</body>

</html>
