<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dodawanie pod kreską do 1000</title>
  <style>
    :root {
      --primary: #3498db;
      --bg: #f0f4f8;
      --white: #ffffff;
      --cell-size: 55px;
    }

    /* NAGŁÓWEK */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--white);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      color: var(--primary);
      font-size: 1.2rem;
      margin: 0;
    }

    .btn-back {
      background: transparent;
      color: var(--primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: bold;
      padding: 8px;
    }

    .hamburger {
      background: transparent;
      color: var(--primary);
      border: none;
      padding: 8px;
      cursor: pointer;
      font-size: 22px;
      display: none;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: row;
      height: 100vh;
      background-color: var(--bg);
      overflow: hidden;
      padding-top: 60px;
    }

    .main {
      flex: 1;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      :root { --cell-size: 45px; }
      .hamburger { display: block; }
      .history {
        position: fixed;
        right: 0;
        top: 60px;
        height: calc(100% - 60px);
        z-index: 1000;
        transform: translateX(100%);
        box-shadow: -5px 0 15px rgba(0,0,0,0.2);
      }
      .history.active { transform: translateX(0); }
    }

    /* HISTORIA */
    .history {
      width: 300px;
      border-left: 2px solid #ddd;
      padding: 20px;
      overflow-y: auto;
      background-color: var(--white);
      transition: transform 0.3s ease;
    }

    /* TABELA MATEMATYCZNA */
    .addition-table {
      border-collapse: collapse;
      margin: 20px 0;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .addition-table td {
      width: var(--cell-size);
      height: var(--cell-size);
      text-align: center;
      vertical-align: middle;
      font-size: 26px;
      border: 1px solid #ccc;
    }
    .addition-table td.no-border { border: none; background: none; }
    
    /* POLA POMOCNICZE (OBRAMOWANIE) */
    .carry-row td { 
      height: 35px; 
      border: none !important; 
      vertical-align: bottom;
    }
    .carry-input {
      width: 30px;
      height: 25px;
      text-align: center;
      font-size: 14px;
      border: 1px dashed #999 !important; /* WIDOCZNE OBRAMOWANIE */
      border-radius: 3px;
      color: #666;
      background-color: #fff;
      outline: none;
      display: inline-block;
    }

    .line-row td { border-bottom: 3px solid #333; }

    /* INPUTY WYNIKU */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=tel] { -moz-appearance: textfield; outline: none; border: none; }

    .result-input {
      width: 100%;
      height: 100%;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      background-color: #eef6ff;
    }

    .operator { font-size: 30px; font-weight: bold; }

    .btn-check {
      padding: 12px 30px;
      font-size: 18px;
      margin-top: 15px;
      cursor: pointer;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 5px;
      width: 200px;
    }

    .entry { margin-bottom: 8px; font-size: 14px; padding: 8px; border-radius: 4px; border-bottom: 1px solid #eee; }
    .correct { color: green; background-color: #e8f5e9; }
    .incorrect { color: red; background-color: #ffebee; }

    #feedback { margin-top: 15px; font-weight: bold; font-size: 18px; min-height: 24px; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      :root { --cell-size: 45px; }
      .hamburger { display: block; }
      .history {
        position: fixed;
        right: 0;
        top: 0;
        height: 100%;
        z-index: 1000;
        transform: translateX(100%);
        box-shadow: -5px 0 15px rgba(0,0,0,0.2);
      }
      .history.active { transform: translateX(0); }
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 40px;
      margin-bottom: 15px;
    }

    .history-header h3 {
      margin: 0;
    }

    .close-history {
      background: transparent;
      color: var(--primary);
      border: none;
      font-size: 28px;
      cursor: pointer;
      padding: 4px 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="index.html" class="btn-back">‹</a>
      <h1>Dodawanie pod kreską</h1>
    </div>
    <button class="hamburger" onclick="toggleHistory()">☰</button>
  </div>

  <div class="main">
    <div id="feedback"></div>
    <button class="btn-check" onclick="checkAnswer()">Sprawdź</button>

    <table class="addition-table">
      <tr class="carry-row">
        <td class="no-border"><input type="tel" class="carry-input" id="c4" maxlength="1"></td>
        <td class="no-border"><input type="tel" class="carry-input" id="c3" maxlength="1"></td>
        <td class="no-border"><input type="tel" class="carry-input" id="c2" maxlength="1"></td>
        <td class="no-border"></td>
      </tr>
      <tr>
        <td class="no-border"></td>
        <td id="n1-h">0</td>
        <td id="n1-t">0</td>
        <td id="n1-u">0</td>
      </tr>
      <tr class="line-row">
        <td class="no-border operator">+</td>
        <td id="n2-h">0</td>
        <td id="n2-t">0</td>
        <td id="n2-u">0</td>
      </tr>
      <tr>
        <td><input type="tel" class="result-input" id="res-1" maxlength="1"></td>
        <td><input type="tel" class="result-input" id="res-2" maxlength="1"></td>
        <td><input type="tel" class="result-input" id="res-3" maxlength="1"></td>
        <td><input type="tel" class="result-input" id="res-4" maxlength="1"></td>
      </tr>
    </table>

    <div id="feedback"></div>
    <button class="btn-check" onclick="checkAnswer()">Sprawdź</button>
    <p>Poprawne: <span id="correct-count">0</span> | Błędne: <span id="incorrect-count">0</span></p>
  </div>

  <div class="history" id="historyPanel">
    <div class="history-header">
      <h3>Historia zadań</h3>
      <button class="close-history" onclick="toggleHistory()">×</button>
    </div>
    <div id="historyLog"></div>
  </div>

  <script>
    let val1, val2, totalSum;
    let scoreCorrect = 0;
    let scoreIncorrect = 0;
    let taskNumber = 1;

    const inputOrder = ['res-4', 'res-3', 'res-2', 'res-1'];

    inputOrder.forEach((id, index) => {
      const el = document.getElementById(id);
      el.addEventListener('input', function() {
        if (this.value.length === 1 && index < inputOrder.length - 1) {
          document.getElementById(inputOrder[index + 1]).focus();
        }
      });
    });

    function toggleHistory() {
      document.getElementById('historyPanel').classList.toggle('active');
    }

    function generateTask() {
      val1 = Math.floor(Math.random() * 850) + 100;
      val2 = Math.floor(Math.random() * (999 - 100)) + 100;
      if (val1 + val2 > 1999) val2 = 1999 - val1;
      
      totalSum = val1 + val2;

      const s1 = val1.toString().padStart(3, '0');
      const s2 = val2.toString().padStart(3, '0');

      document.getElementById('n1-h').innerText = s1[0];
      document.getElementById('n1-t').innerText = s1[1];
      document.getElementById('n1-u').innerText = s1[2];

      document.getElementById('n2-h').innerText = s2[0];
      document.getElementById('n2-t').innerText = s2[1];
      document.getElementById('n2-u').innerText = s2[2];

      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('feedback').innerText = '';
      document.getElementById('historyPanel').classList.remove('active');
      document.getElementById('res-4').focus();
    }

    function checkAnswer() {
      const r1 = document.getElementById('res-1').value;
      const r2 = document.getElementById('res-2').value;
      const r3 = document.getElementById('res-3').value;
      const r4 = document.getElementById('res-4').value;

      const userString = (r1 + r2 + r3 + r4).trim();
      const userVal = parseInt(userString, 10);

      const isCorrect = userVal === totalSum;
      const log = document.getElementById('historyLog');
      const entry = document.createElement('div');
      
      if (isCorrect) {
        document.getElementById('feedback').innerHTML = "<span style='color:green'>Dobrze!</span>";
        scoreCorrect++;
        entry.className = "entry correct";
        entry.innerText = `#${taskNumber}: ${val1}+${val2}=${userVal} ✅`;
        document.getElementById('correct-count').innerText = scoreCorrect;
        log.prepend(entry);
        taskNumber++;
        setTimeout(generateTask, 1500);
      } else {
        document.getElementById('feedback').innerHTML = "<span style='color:red'>Błąd! Spróbuj poprawić.</span>";
        scoreIncorrect++;
        entry.className = "entry incorrect";
        entry.innerText = `#${taskNumber}: ${val1}+${val2}=${userString || '?'} ❌`;
        document.getElementById('incorrect-count').innerText = scoreIncorrect;
        log.prepend(entry);
        document.getElementById('res-4').focus();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') checkAnswer();
    });

    window.onload = generateTask;
  </script>
</body>
</html>
